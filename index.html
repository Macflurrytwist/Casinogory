<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASINOGORY — The Rarity Ledger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Bungee&display=swap');

:root{
  --bezel:#0c0a10;
  --bezel-2:#1a1420;
  --velvet:#5c0b1e;
  --velvet-2:#7a1228;
  --gold:#d9b64a;
  --gold-2:#f3d878;
  --cream:#f3ead4;
  --ink:#221a13;
  --neon-cyan:#39e6e0;
  --neon-pink:#ff3d81;
  --slate:#5a6270;
  --rust:#a2512c;
  --brass:#b1852c;
  --seal:#7a2230;
  --border-bronze:#8c5a2b;
  --border-silver:#b9c1c9;
  --border-gold:#e8c95a;
  --border-legend:#39e6e0;
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh; font-family:'Inter',sans-serif; color:var(--cream);
  background:radial-gradient(ellipse at 50% -10%, #241926 0%, transparent 55%), var(--bezel);
  display:flex; justify-content:center; padding:40px 14px 90px;
}
.wrap{width:100%; max-width:820px;}
.topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px;}
.brandmini{font-family:'Bungee',cursive; font-size:14px; letter-spacing:.05em; color:var(--gold-2);}
.about-link{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase;
  background:none; border:1px solid #6b4a52; color:#e3c9ce; border-radius:3px; padding:5px 9px; cursor:pointer;
}
.about-link:hover{border-color:var(--gold); color:var(--gold-2);}
.demo-banner{
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:#c9a6ad; background:rgba(255,255,255,.06);
  border:1px dashed #6b4a52; padding:6px 10px; border-radius:4px; display:none;
}
.demo-banner.show{display:block;}
.userbar{display:flex; gap:10px; align-items:center; font-family:'IBM Plex Mono',monospace; font-size:12px;}
.userbar button{background:none; border:1px solid #665; color:var(--cream); border-radius:3px; padding:5px 9px; cursor:pointer; font-family:inherit;}

/* MACHINE CABINET */
.cabinet{
  position:relative; border-radius:18px; padding:26px 22px 30px;
  background:linear-gradient(180deg,var(--bezel-2),var(--bezel));
  box-shadow:0 40px 70px -25px rgba(0,0,0,.7), inset 0 0 0 2px #000;
  border:10px solid var(--border-bronze);
  transition:border-color .4s ease;
}
.cabinet.perk-silver{border-color:var(--border-silver);}
.cabinet.perk-gold{border-color:var(--border-gold);}
.cabinet.perk-legend{border-color:var(--border-legend); box-shadow:0 40px 70px -25px rgba(0,0,0,.7), 0 0 24px -4px var(--neon-cyan);}

.lights{position:absolute; inset:4px; border-radius:12px; pointer-events:none;}
.bulb{position:absolute; width:7px; height:7px; border-radius:50%; background:var(--gold-2); box-shadow:0 0 6px 2px var(--gold-2); animation:chase 1.6s infinite;}
@keyframes chase{0%,100%{opacity:.2;}50%{opacity:1;}}

.marquee{
  text-align:center; margin-bottom:18px;
}
.marquee .casinogory{
  font-family:'Bungee',cursive; font-size:clamp(34px,8vw,56px); letter-spacing:.03em;
  color:var(--gold-2);
  text-shadow:0 0 12px rgba(217,182,74,.85), 0 0 32px rgba(255,61,129,.5), 0 0 50px rgba(57,230,224,.25);
  animation:marquee-shimmer 2.4s infinite;
}
@keyframes marquee-shimmer{
  0%,100%{text-shadow:0 0 12px rgba(217,182,74,.85), 0 0 32px rgba(255,61,129,.5), 0 0 50px rgba(57,230,224,.25);}
  50%{text-shadow:0 0 18px rgba(217,182,74,1), 0 0 44px rgba(255,61,129,.7), 0 0 64px rgba(57,230,224,.4);}
}
.marquee .icons{font-size:20px; letter-spacing:10px; margin-bottom:2px; opacity:.9;}
.marquee .tag{font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:700; letter-spacing:.26em; text-transform:uppercase; color:var(--neon-cyan); margin-top:6px;}

.panel{
  background:linear-gradient(160deg,var(--velvet-2),var(--velvet));
  border-radius:12px; padding:24px 18px; border:1px solid #2a0812;
  box-shadow:inset 0 2px 12px rgba(0,0,0,.5);
}

/* AUTH */
.authcard{max-width:380px; margin:0 auto;}
h2{font-family:'Fraunces',serif; font-weight:700; font-size:22px; margin:0 0 4px; color:var(--cream);}
.sub{font-size:12.5px; color:#e3c9ce; margin:0 0 18px;}
label.field{display:block; margin-bottom:13px;}
label.field span{display:block; font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold-2); margin-bottom:5px;}
input[type=text],input[type=email],input[type=password]{
  width:100%; padding:10px 12px; border-radius:3px; border:1px solid #4a1a26; background:#fbf6e9; color:var(--ink); font-size:14.5px;
}
input:focus{outline:2px solid var(--gold);}
.btn{
  font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase;
  padding:12px 20px; border-radius:4px; border:1px solid var(--gold); background:var(--gold); color:#241205;
  cursor:pointer; font-weight:700;
}
.btn:disabled{opacity:.35; cursor:not-allowed;}
.btn.ghost{background:transparent; color:var(--gold-2);}
.btn-row{display:flex; gap:10px; justify-content:flex-end; margin-top:14px; flex-wrap:wrap;}
.toggle-link{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--neon-cyan); cursor:pointer; text-decoration:underline; margin-top:10px; display:inline-block;}
.error{color:#ff9db0; font-size:12px; font-family:'IBM Plex Mono',monospace; margin:-4px 0 10px;}
.challenge-banner{
  max-width:380px; margin:0 auto 16px; padding:14px 16px; border-radius:6px;
  background:linear-gradient(160deg,#3a0d1a,#5c0b1e); border:1px solid var(--gold);
  text-align:center; font-size:14px; line-height:1.5;
}
.challenge-banner .challenge-cta{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold-2); margin-top:6px;}
.challenge-outcome{
  margin-top:14px; padding:12px 14px; border-radius:6px; background:rgba(217,182,74,.12);
  border:1px solid var(--gold); font-size:14px; text-align:center;
}
.share-panel{margin-top:22px; padding-top:18px; border-top:1px dashed #6b3040;}
.share-copy-status{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--neon-cyan); align-self:center;}
.about-piece{font-size:14.5px; line-height:1.7; color:#f0e6d2;}
.about-piece h2{font-family:'Fraunces',serif; font-size:24px; margin:0 0 14px; color:var(--gold-2);}
.about-piece h3{font-family:'Fraunces',serif; font-size:17px; margin:24px 0 8px; color:var(--gold-2);}
.about-piece p{margin:0 0 14px;}
.about-piece b{color:var(--gold-2);}
.about-piece i{color:var(--neon-cyan); font-style:italic;}
.about-piece ul{margin:0 0 14px; padding-left:20px;}
.about-piece li{margin-bottom:8px;}
.about-signoff{margin-top:22px; padding-top:16px; border-top:1px dashed #6b3040; font-style:italic; color:#e3c9ce;}

/* SLOT MACHINE */
.reel-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:14px; margin:18px 0;}
.reel{
  background:linear-gradient(180deg,#fbf6e9,#ecdfc0); border-radius:8px; border:3px solid #241205;
  aspect-ratio:2/3; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden;
}
.reel.locked{filter:grayscale(1) brightness(.6);}
.reel .strip{font-family:'IBM Plex Mono',monospace; font-size:46px; font-weight:700; color:var(--ink);}
.reel.spinning .strip{animation:spin-blur .12s linear infinite;}
@keyframes spin-blur{0%{transform:translateY(-6px);}50%{transform:translateY(6px);}100%{transform:translateY(-6px);}}
.reel .taglabel{font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#7a6f4e; margin-top:4px;}
.reel .padlock{font-size:26px;}
.reel .doneflag{position:absolute; top:6px; right:6px; font-size:9px; font-family:'IBM Plex Mono',monospace; background:var(--seal); color:#fff; padding:2px 5px; border-radius:3px;}
.reel-playbtn{width:100%; margin-top:8px;}

.pull-lever-shout{
  text-align:center; font-family:'Bungee',cursive; font-size:clamp(22px,5.5vw,34px);
  letter-spacing:.03em; margin:18px 0 4px; color:var(--gold-2);
  text-shadow:0 0 8px rgba(217,182,74,.7), 0 0 22px rgba(255,61,129,.4);
  animation:shout-blink 1s infinite;
}
@keyframes shout-blink{0%,55%{opacity:1; transform:scale(1);}60%{opacity:.55; transform:scale(.98);}100%{opacity:1; transform:scale(1);}}

.lever-area{display:flex; align-items:center; justify-content:center; gap:18px; margin-top:10px;}
.lever-track{width:26px; height:130px; background:#241205; border-radius:13px; position:relative; box-shadow:inset 0 0 0 2px #000, 0 0 0 3px var(--gold);}
.lever-track.glowing{animation:lever-glow 1.1s infinite;}
@keyframes lever-glow{0%,100%{box-shadow:inset 0 0 0 2px #000, 0 0 0 3px var(--gold);}50%{box-shadow:inset 0 0 0 2px #000, 0 0 14px 4px var(--neon-pink);}}
.lever-knob{
  width:42px; height:42px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #ff8a9c, #b3122f);
  position:absolute; left:50%; transform:translateX(-50%); top:0; box-shadow:0 4px 10px rgba(0,0,0,.6), 0 0 12px rgba(255,61,129,.5); cursor:pointer;
  transition:top .25s cubic-bezier(.34,1.56,.64,1);
  border:3px solid var(--gold-2);
}
.lever-knob.pulled{top:88px;}
.lever-label{font-family:'IBM Plex Mono',monospace; font-size:12.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gold-2); text-align:center;}

/* CATEGORY GRID */
.cat-status{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--gold-2); margin-bottom:12px;}
.cat-status b{color:#ff9db0;}
.cat-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:9px;}
.cat-chip{
  border:1px solid #4a1a26; border-radius:4px; padding:9px 10px; background:#fbf6e9; color:var(--ink);
  display:flex; align-items:center; gap:8px; cursor:pointer;
}
.cat-chip.selected{background:var(--gold); border-color:var(--gold);}
.cat-chip .num{font-family:'IBM Plex Mono',monospace; font-size:10px; opacity:.6; min-width:22px;}
.cat-chip .name{font-size:13px; font-weight:600; flex:1;}
.cat-chip .swap{font-size:13px; opacity:.55; padding:2px 5px;}
.cat-chip .swap:hover{opacity:1;}

/* WORD REVEAL + ANSWERS */
.word-banner{text-align:center; padding:20px 12px; margin:6px 0 18px; border-radius:8px; background:linear-gradient(180deg,#fbf3dc,#efe0b8); border:2px solid var(--seal); box-shadow:0 0 0 3px var(--gold), 0 8px 20px -8px rgba(0,0,0,.6);}
.word-banner .tiny{font-family:'Bungee',cursive; font-size:clamp(15px,3vw,20px); letter-spacing:.08em; text-transform:uppercase; color:var(--seal); text-shadow:0 0 1px rgba(122,34,48,.3);}
.word-banner .theword{font-family:'Fraunces',serif; font-style:italic; font-weight:700; font-size:clamp(30px,7vw,46px); color:var(--ink); margin:6px 0;}
.word-banner .rarity-line{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--seal);}
.word-banner-compact{padding:12px 12px;}
.word-banner-compact .theword{font-size:clamp(22px,5vw,30px); margin:2px 0;}
.howto-note{
  font-size:12.5px; line-height:1.55; color:#3a2f1c; background:rgba(255,255,255,.35);
  border:1px dashed #8a7c53; border-radius:6px; padding:12px 14px; margin:0 0 18px;
}
.howto-note b{color:var(--ink);} .howto-note i{color:var(--seal);}
.timer-bar{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:16px;}
.timer-label{font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:#e3c9ce;}
.timer-display{font-family:'IBM Plex Mono',monospace; font-size:26px; font-weight:700; color:var(--gold-2); background:#241205; padding:4px 14px; border-radius:5px; border:1px solid var(--gold); min-width:70px; text-align:center;}
.timer-display.urgent{color:#ff6b7a; border-color:#ff6b7a; animation:pulse-urgent .6s infinite;}
@keyframes pulse-urgent{0%,100%{opacity:1;}50%{opacity:.5;}}
.answer-row{margin-bottom:12px;}
.answer-row .cat-label{font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold-2); margin-bottom:4px;}

/* RESULTS */
.ledger-row{padding:11px 0; border-bottom:1px dashed #6b3040;}
.ledger-row:last-of-type{border-bottom:none;}
.ledger-top{display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap;}
.ledger-row .catname{font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; color:#e3c9ce;}
.ledger-row .answer{font-family:'Fraunces',serif; font-size:15.5px; font-style:italic; color:var(--cream);}
.stamp{font-family:'IBM Plex Mono',monospace; font-size:9.5px; font-weight:700; letter-spacing:.06em; padding:4px 8px; border-radius:2px; color:#fff; text-transform:uppercase; transform:rotate(-3deg); display:inline-block;}
.breakdown{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#c9a6ad; margin-top:5px;}
.slang-tag{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--neon-cyan); margin-top:3px;}
.points{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:15px; color:var(--gold-2);}
.total-block{margin-top:16px; padding-top:14px; border-top:2px solid var(--gold); display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px;}
.total-block .label{font-family:'Fraunces',serif; font-size:17px; font-weight:700; color:var(--cream);}
.total-block .value{font-family:'IBM Plex Mono',monospace; font-size:32px; font-weight:700; color:var(--gold-2);}
.bonus-line{font-family:'IBM Plex Mono',monospace; font-size:11px; color:#c9a6ad; margin-top:5px; text-align:right;}

/* STATS */
.streak-hero{text-align:center; padding:16px; margin-bottom:16px;}
.streak-hero .num{font-family:'IBM Plex Mono',monospace; font-size:44px; font-weight:700; color:var(--gold-2);}
.streak-hero .lbl{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#e3c9ce;}
.perk-list{display:flex; flex-direction:column; gap:8px; margin:14px 0;}
.perk-row{display:flex; justify-content:space-between; align-items:center; padding:9px 12px; border-radius:5px; background:rgba(0,0,0,.2); font-size:13px;}
.perk-row.locked{opacity:.4;}
.perk-row .days{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold-2);}
.history-row{display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:12px; padding:7px 0; border-bottom:1px solid #4a1a26; color:#e3c9ce;}
.link-panel{background:rgba(0,0,0,.2); border-radius:6px; padding:14px; margin-bottom:6px;}
.link-code{font-family:'IBM Plex Mono',monospace; font-size:30px; font-weight:700; letter-spacing:.15em; color:var(--gold-2); text-align:center; margin-bottom:8px;}
.link-panel code{background:#241205; padding:2px 6px; border-radius:3px; color:var(--gold-2);}

.lb-tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
.lb-tab{font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; padding:6px 10px; border-radius:4px; border:1px solid #6b3040; background:transparent; color:#e3c9ce; cursor:pointer;}
.lb-tab.active{background:var(--gold); color:#241205; border-color:var(--gold); font-weight:700;}
.lb-list{margin-top:12px;}
.lb-row{display:grid; grid-template-columns:36px 1fr 1fr 70px; gap:8px; align-items:center; padding:8px 4px; border-bottom:1px solid #4a1a26; font-size:13px;}
.lb-row.lb-head{font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#8a7c53; border-bottom:2px solid var(--gold);}
.lb-rank{font-family:'IBM Plex Mono',monospace; color:var(--gold-2); font-weight:700;}
.lb-name{font-weight:600;}
.lb-word{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#c9a6ad;}
.lb-points{font-family:'IBM Plex Mono',monospace; font-weight:700; color:var(--gold-2); text-align:right;}
@media (max-width:520px){.lb-row{grid-template-columns:28px 1fr 60px;}.lb-row .lb-word{display:none;}}

.note{margin-top:20px; padding:12px 14px; border:1px dashed #6b3040; border-radius:4px; font-size:11.5px; color:#c9a6ad; line-height:1.55;}
.note b{color:var(--gold-2);}

@media (max-width:520px){.cat-grid{grid-template-columns:1fr;}.reel-row{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brandmini">CASINOGORY™ — The Rarity Ledger</div>
    <div style="display:flex; align-items:center; gap:10px;">
      <button class="about-link" onclick="goAbout()">Why I Built This</button>
      <div class="userbar" id="userbar" style="display:none;"></div>
    </div>
  </div>
  <div class="demo-banner" id="demoBanner">Live backend not detected at <span id="apiBaseLabel"></span> — running in local demo mode. See README to run the real Node/SQLite backend.</div>

  <div class="cabinet" id="cabinet">
    <div class="lights" id="lights"></div>
    <div class="marquee">
      <div class="icons">🎰 ♠️ 💰 ♦️ 🎰</div>
      <div class="casinogory">CASINOGORY</div>
      <div class="tag">Pull. Reveal. Answer. Score.</div>
    </div>
    <div class="panel" id="app"></div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
// If this page is being served BY the backend (server.js serves the
// frontend statically), same-origin "/api" works wherever it's deployed.
// If opened directly as a local file, fall back to localhost:4000.
const API_BASE = (location.protocol === "file:")
  ? "http://localhost:4000/api"
  : (location.origin + "/api");
let backendReachable = null; // null = unknown, true/false once tested
let authToken = null;

/* ============================================================
   API layer — real backend first, transparent local fallback
   ============================================================ */
async function apiFetch(path, opts = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 2500);
  try {
    const res = await fetch(API_BASE + path, {
      ...opts,
      signal: controller.signal,
      headers: {
        "Content-Type": "application/json",
        ...(authToken ? { Authorization: "Bearer " + authToken } : {}),
        ...(opts.headers || {})
      }
    });
    clearTimeout(timeout);
    backendReachable = true;
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw { apiError: true, status: res.status, message: data.error || "Request failed" };
    return data;
  } catch (err) {
    clearTimeout(timeout);
    if (err && err.apiError) throw err; // real backend responded with an error — surface it
    backendReachable = false;
    throw { networkError: true };
  }
}

/* ============================================================
   LOCAL FALLBACK ENGINE
   Mirrors the backend's logic client-side so the game is fully
   playable without the Node server running (e.g. in this preview).
   Historic rarity here is the same simulated heuristic used as the
   backend's own fallback — connect the real backend for live
   Google Ngram-sourced historic rarity.
   ============================================================ */
const LOCAL = (() => {
  function hashStringToInt(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=(h<<13)|(h>>>19);}return h>>>0;}
  function mulberry32(seed){return function(){seed|=0;seed=(seed+0x6D2B79F5)|0;let t=Math.imul(seed^(seed>>>15),1|seed);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
  function seededShuffle(arr,rng){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

  const WORDS = {
    4:[{word:"TIME",rarity:5},{word:"LOVE",rarity:8},{word:"GAME",rarity:10},{word:"BOOK",rarity:12},{word:"FISH",rarity:15},{word:"MOON",rarity:18},{word:"GOLD",rarity:22},{word:"WOLF",rarity:28},{word:"EPIC",rarity:35},{word:"JADE",rarity:44},{word:"YOGA",rarity:52},{word:"QUIZ",rarity:60},{word:"NULL",rarity:66},{word:"IBEX",rarity:88},{word:"ONYX",rarity:92}],
    5:[{word:"HOUSE",rarity:4},{word:"WATER",rarity:5},{word:"HEART",rarity:7},{word:"MUSIC",rarity:9},{word:"DREAM",rarity:12},{word:"GHOST",rarity:18},{word:"MAGIC",rarity:15},{word:"TIGER",rarity:20},{word:"STORM",rarity:22},{word:"QUERY",rarity:32},{word:"ZEBRA",rarity:42},{word:"IVORY",rarity:55},{word:"WALTZ",rarity:62},{word:"EPOXY",rarity:70},{word:"JAZZY",rarity:80}],
    6:[{word:"FRIEND",rarity:5},{word:"GARDEN",rarity:10},{word:"ORANGE",rarity:14},{word:"WINTER",rarity:13},{word:"PLANET",rarity:16},{word:"DRAGON",rarity:20},{word:"PUZZLE",rarity:26},{word:"GALAXY",rarity:30},{word:"VOYAGE",rarity:36},{word:"OXYGEN",rarity:33},{word:"MYSTIC",rarity:46},{word:"ZODIAC",rarity:56},{word:"QUARTZ",rarity:64},{word:"WIZARD",rarity:41},{word:"JACKAL",rarity:72}],
    7:[{word:"FREEDOM",rarity:8},{word:"JOURNEY",rarity:14},{word:"MYSTERY",rarity:18},{word:"RAINBOW",rarity:20},{word:"CRYSTAL",rarity:25},{word:"ORCHARD",rarity:32},{word:"VINTAGE",rarity:30},{word:"PHANTOM",rarity:42},{word:"GRIFFIN",rarity:58},{word:"OBELISK",rarity:70},{word:"PARADOX",rarity:65},{word:"ZEALOUS",rarity:78}]
  };

  const UNIVERSAL = ["Movies","Countries","Foods","Animals","Sports","Celebrities","Brands","TV Shows","Songs","Books","Video Games","Cars","Colors","Occupations","Historical Figures","Superheroes","Diseases","Inventions","Landmarks","Drinks","Desserts","Musical Instruments","Dances","Holidays","Mythical Creatures","Board Games","Emotions","Weather Phenomena","Planets & Space","Dinosaurs","Insects","Flowers","Gemstones","Currencies","Languages","Sports Teams","Fashion Brands","Social Media Apps","Kitchen Appliances","Dog Breeds","School Subjects","Card Games","Casino Games","Cocktails","Cheeses","Pasta Shapes","Spices","Tools","Furniture","Music Genres","Comic Book Characters","Streaming Shows","Podcasts","Fictional Planets","Constellations","Ocean Creatures","Birds","Trees","Rivers","Mountains","Deserts","Islands","World Capitals","Religions","Philosophers","Scientists","Painters","Architecture Styles","Fonts","Programming Languages","Operating Systems","Airlines","Fast Food Chains","Ice Cream Flavors","Candy Brands","Yoga Poses","Martial Arts","Olympic Sports","Wrestling Moves","Superstitions","Fairy Tales","Nursery Rhymes","Slang & Lingo (Worldwide)","Internet Memes","Emojis","Zodiac Signs","Tarot Cards","Perfumes","Watch Brands","Sneaker Brands","Kitchen Utensils","Rock Bands","Dance Crazes","Board Game Pieces","Video Game Consoles","Chess Pieces","Types of Bread","Herbal Teas"];
  const LENGTH_SPECIFIC = [
    {name:"Four-Letter Boy Names",onlyLengths:[4]},{name:"Four-Letter Card Game Terms",onlyLengths:[4]},{name:"Four-Letter Poker Hand Terms",onlyLengths:[4]},{name:"Four-Letter Weather Words",onlyLengths:[4]},{name:"Four-Letter Text Abbreviations",onlyLengths:[4]},
    {name:"Five-Letter Wordle-Style Answers",onlyLengths:[5]},{name:"Five-Letter Flower Names",onlyLengths:[5]},{name:"Five-Letter Dance Moves",onlyLengths:[5]},{name:"Five-Letter Spice Names",onlyLengths:[5]},{name:"Five-Letter Board Game Pieces",onlyLengths:[5]},
    {name:"Six-Letter Countries",onlyLengths:[6]},{name:"Six-Letter Car Models",onlyLengths:[6]},{name:"Six-Letter Superhero Aliases",onlyLengths:[6]},{name:"Six-Letter Slang Greetings",onlyLengths:[6]},{name:"Six-Letter Cocktail Names",onlyLengths:[6]},
    {name:"Seven-Letter Chemical Elements",onlyLengths:[7]},{name:"Seven-Letter Constellations",onlyLengths:[7]},{name:"Seven-Letter Mythical Beasts",onlyLengths:[7]},{name:"Seven-Letter Planets or Moons",onlyLengths:[7]},{name:"License-Plate-Style Codes",onlyLengths:[6,7]}
  ];
  const CATEGORY_BANK = [
    ...UNIVERSAL.map((name,i)=>({id:"u"+i,name,onlyLengths:null})),
    ...LENGTH_SPECIFIC.map((c,i)=>({id:"s"+i,name:c.name,onlyLengths:c.onlyLengths}))
  ];
  function fitsLength(c,len){return !c.onlyLengths || c.onlyLengths.includes(len);}

  const REGIONAL_SLANG = [
    {term:"cheers",meaning:"thanks / goodbye",region:"United Kingdom"},{term:"gutted",meaning:"very disappointed",region:"United Kingdom"},
    {term:"arvo",meaning:"afternoon",region:"Australia"},{term:"servo",meaning:"gas station",region:"Australia"},
    {term:"lekker",meaning:"nice, great",region:"South Africa"},{term:"eish",meaning:"expression of surprise",region:"South Africa"},
    {term:"japa",meaning:"to relocate abroad",region:"Nigeria"},{term:"wahala",meaning:"trouble, drama",region:"Nigeria"},
    {term:"irie",meaning:"feeling good",region:"Jamaica"},{term:"yaar",meaning:"friend",region:"India"},
    {term:"jugaad",meaning:"improvised fix",region:"India"},{term:"kilig",meaning:"romantic excitement",region:"Philippines"},
    {term:"grand",meaning:"great, fine",region:"Ireland"},{term:"craic",meaning:"fun, good times",region:"Ireland"},
    {term:"yeet",meaning:"to throw with force",region:"United States (internet)"},{term:"rizz",meaning:"charisma, charm",region:"United States (internet)"},
    {term:"y'all",meaning:"you all",region:"United States (Southern)"},{term:"hella",meaning:"very, a lot",region:"United States (West Coast)"}
  ];

  const COMMON_WORDS = new Set(["THE","CAT","DOG","RUN","HAPPY","MOVIE","MUSIC","LOVE","TIME","WATER","HOUSE","CAR","SUN","STAR","APPLE","BANANA","PIZZA","COFFEE","SCHOOL","BOOK","PHONE","TABLE","CHAIR","RED","BLUE","GREEN","BALL","TREE","RAIN","FRIEND","SONG","GAME","SHOE","SOCCER","FOOTBALL","BASKETBALL","PARIS","LONDON","AMERICA","FRANCE","LION","TIGER","BEAR"]);

  const PERK_TIERS = [
    {days:3,id:"bronze_border",label:"Bronze Machine Trim"},
    {days:7,id:"silver_border",label:"Silver Machine Trim"},
    {days:7,id:"seven_letter_reel",label:"7-Letter Reel Unlocked"},
    {days:14,id:"gold_border",label:"Gold Machine Trim"},
    {days:30,id:"legendary_border",label:"Legendary Neon Trim"},
    {days:30,id:"double_bonus",label:"Double Word-of-Day Bonus"}
  ];

  // in-memory "database"
  const users = new Map(); // email -> user
  let nextId = 1;
  const allSubmissions = []; // flat list across all users, for leaderboards

  // Seed a few phantom players so the leaderboard isn't empty on first run
  // in local demo mode (a single real browser session has no other
  // players to compare against otherwise).
  (function seedBots(){
    const bots = [
      {name:"Marlowe V.", word:"OBELISK", wordLength:7, daily:210, historic:340, slang:0},
      {name:"Priya N.", word:"QUARTZ", wordLength:6, daily:260, historic:180, slang:20},
      {name:"Kofi A.", word:"JAZZY", wordLength:5, daily:190, historic:410, slang:0},
      {name:"Sana T.", word:"IBEX", wordLength:4, daily:150, historic:520, slang:20},
    ];
    const today = todayStr();
    bots.forEach(b=>{
      allSubmissions.push({
        name: b.name, date: today, word_length: b.wordLength, word: b.word,
        daily_points_total: b.daily, historic_points_total: b.historic, slang_points_total: b.slang,
        total_score: b.daily + b.historic + b.slang
      });
    });
  })();

  const TIMER = (()=>{
    const BASE=12, COUNT=10, MIN=60, MAX=240;
    const LEN_ADJ = {4:-10,5:0,6:10,7:30};
    return function computeTimeLimitSeconds(wordLength, selectedCategories){
      const base = BASE*COUNT;
      const lengthAdj = LEN_ADJ[wordLength] ?? 0;
      const hardCount = (selectedCategories||[]).filter(c=>c && c.onlyLengths).length;
      const total = base + lengthAdj + hardCount*5;
      return Math.max(MIN, Math.min(MAX, total));
    };
  })();

  function todayStr(){return new Date().toISOString().slice(0,10);}
  function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}

  function getWordsOfDay(dateStr){
    const rng = mulberry32(hashStringToInt("rarity-ledger:words:"+dateStr));
    const out = {};
    [4,5,6,7].forEach(len=>{const list=WORDS[len];out[len]=list[Math.floor(rng()*list.length)];});
    return out;
  }
  function getSlotOrder(dateStr){
    const rng = mulberry32(hashStringToInt("rarity-ledger:slots:"+dateStr));
    return seededShuffle([4,5,6],rng);
  }
  function getCategoriesForLength(dateStr,length){
    const fitting = CATEGORY_BANK.filter(c=>fitsLength(c,length));
    const rng = mulberry32(hashStringToInt("rarity-ledger:cats:"+dateStr+":"+length));
    let shuffled = seededShuffle(fitting,rng);
    if(shuffled.length<20){
      const universal = CATEGORY_BANK.filter(c=>!c.onlyLengths && !shuffled.includes(c));
      shuffled = shuffled.concat(seededShuffle(universal,rng));
    }
    return shuffled.slice(0,20);
  }
  function swapCategory(dateStr,length,currentTwenty,idToReplace){
    const fitting = CATEGORY_BANK.filter(c=>fitsLength(c,length));
    const rng = mulberry32(hashStringToInt("rarity-ledger:cats:"+dateStr+":"+length));
    const fullShuffle = seededShuffle(fitting,rng);
    const used = new Set(currentTwenty.map(c=>c.id));
    const replacement = fullShuffle.find(c=>!used.has(c.id));
    if(!replacement) return currentTwenty;
    return currentTwenty.map(c=>c.id===idToReplace?replacement:c);
  }

  function estimateAnswerRarity(answer){
    const a=(answer||"").trim(); if(!a) return 0;
    const upper=a.toUpperCase(); const lettersOnly=upper.replace(/[^A-Z]/g,"");
    let score=18; score+=Math.max(0,lettersOnly.length-4)*3;
    const rareLetters=["Q","X","Z","J","K","W","V"]; let rareCount=0;
    for(const ch of lettersOnly) if(rareLetters.includes(ch)) rareCount++;
    score+=rareCount*11;
    const words=a.split(/\s+/).filter(Boolean); if(words.length>1) score+=8;
    const vowels=(lettersOnly.match(/[AEIOU]/g)||[]).length;
    const vowelRatio=lettersOnly.length?vowels/lettersOnly.length:0;
    if(vowelRatio<0.3) score+=10;
    if(COMMON_WORDS.has(lettersOnly)) score=Math.min(score,14);
    return Math.max(1,Math.min(99,Math.round(score)));
  }
  function tierFor(score){
    if(score<20) return {name:"Common",base:10,css:"var(--slate)"};
    if(score<45) return {name:"Uncommon",base:25,css:"var(--rust)"};
    if(score<75) return {name:"Rare",base:50,css:"var(--brass)"};
    return {name:"Legendary",base:90,css:"var(--seal)"};
  }
  function simulatedHistoricRarity(word){ // local stand-in for the real Ngram lookup
    const key=(word||"").trim().toUpperCase();
    const known = Object.values(WORDS).flat().find(w=>w.word===key);
    if(known) return known.rarity;
    let score=20+Math.max(0,key.length-4)*4;
    for(const ch of key) if(["Q","X","Z","J","K","W","V"].includes(ch)) score+=10;
    return Math.max(1,Math.min(99,score));
  }
  function matchesRegionalSlang(answer){
    const key=(answer||"").trim().toLowerCase();
    return REGIONAL_SLANG.find(e=>e.term.toLowerCase()===key)||null;
  }
  function scoreSubmission(categoriesWithAnswers, wordRarityDaily){
    const rows = categoriesWithAnswers.map(({category,answer})=>{
      const trimmed = (answer||"").trim();
      if(!trimmed){
        return {category,answer:"",dailyRarityScore:0,tier:"Skipped",tierColor:"var(--slate)",dailyPoints:0,historicRarity:0,historicPoints:0,slangMatch:null,slangBonus:0,total:0};
      }
      const dailyRarityScore = estimateAnswerRarity(answer);
      const tier = tierFor(dailyRarityScore);
      const wordBonusMult = 1 + wordRarityDaily/100;
      const dailyPoints = Math.round(tier.base*wordBonusMult);
      const historicRarity = simulatedHistoricRarity(answer);
      const historicPoints = Math.round(historicRarity*0.6);
      const slangMatch = matchesRegionalSlang(answer);
      const slangBonus = slangMatch?20:0;
      const total = dailyPoints+historicPoints+slangBonus;
      return {category,answer,dailyRarityScore,tier:tier.name,tierColor:tier.css,dailyPoints,historicRarity,historicPoints,slangMatch:slangMatch?{term:slangMatch.term,region:slangMatch.region}:null,slangBonus,total};
    });
    const grandTotal = rows.reduce((s,r)=>s+r.total,0);
    return {rows,grandTotal};
  }

  function updateLoginStreak(user){
    const today = todayStr();
    let {current_streak,longest_streak,last_login_date} = user;
    if(last_login_date===today){ /* no change */ }
    else if(last_login_date && daysBetween(last_login_date,today)===1) current_streak+=1;
    else current_streak=1;
    longest_streak = Math.max(longest_streak,current_streak);
    const unlocked = PERK_TIERS.filter(p=>current_streak>=p.days).map(p=>p.id);
    user.last_login_date=today; user.current_streak=current_streak; user.longest_streak=longest_streak; user.unlocked_perks=unlocked;
    return {current_streak,longest_streak,unlocked_perks:unlocked};
  }

  function signup({name,email,password}){
    const key = email.toLowerCase();
    if(users.has(key)) throw {apiError:true,status:409,message:"An account with that email already exists"};
    const user = {id:nextId++,name,email:key,password,last_login_date:null,current_streak:0,longest_streak:0,unlocked_perks:[],submissions:[]};
    users.set(key,user);
    const streak = updateLoginStreak(user);
    return {token:"local-"+user.id, user:{id:user.id,name,email:key}, streak};
  }
  function login({email,password}){
    const user = users.get((email||"").toLowerCase());
    if(!user || user.password!==password) throw {apiError:true,status:401,message:"Invalid email or password"};
    const streak = updateLoginStreak(user);
    return {token:"local-"+user.id, user:{id:user.id,name:user.name,email:user.email}, streak};
  }
  function userFromToken(token){
    const id = parseInt(String(token).replace("local-",""),10);
    for(const u of users.values()) if(u.id===id) return u;
    throw {apiError:true,status:401,message:"Invalid session"};
  }

  function status(token){
    const user = userFromToken(token);
    const date = todayStr();
    const slotOrder = getSlotOrder(date);
    const submittedToday = user.submissions.filter(s=>s.date===date).map(s=>s.word_length);
    const sevenUnlocked = user.unlocked_perks.includes("seven_letter_reel");
    return {date, slotOrder, availableLengths: sevenUnlocked?[4,5,6,7]:[4,5,6], submittedLengths:submittedToday, streak:{current_streak:user.current_streak,longest_streak:user.longest_streak,unlocked_perks:user.unlocked_perks}};
  }
  function spin(token,{wordLength}){
    const user = userFromToken(token);
    const date = todayStr();
    if(wordLength===7 && !user.unlocked_perks.includes("seven_letter_reel")) throw {apiError:true,status:403,message:"7-letter reel unlocks at a 7-day login streak"};
    if(user.submissions.find(s=>s.date===date && s.word_length===wordLength)) throw {apiError:true,status:409,message:"Already submitted for this word length today."};
    const wod = getWordsOfDay(date)[wordLength];
    const categories = getCategoriesForLength(date,wordLength);
    const slangContext = { regional: REGIONAL_SLANG.filter(e=>e.term.toLowerCase()===wod.word.toLowerCase()), urban: null };
    return {date, wordLength, word:wod.word, wordRarityDaily:wod.rarity, categories, slangContext};
  }
  function swapCategoryLocal(token,{wordLength,currentCategories,categoryIdToReplace}){
    const date = todayStr();
    return {categories: swapCategory(date,wordLength,currentCategories,categoryIdToReplace)};
  }
  function scoreTotals(rows){
    return {
      dailyPointsTotal: rows.reduce((s,r)=>s+r.dailyPoints,0),
      historicPointsTotal: rows.reduce((s,r)=>s+r.historicPoints,0),
      slangPointsTotal: rows.reduce((s,r)=>s+r.slangBonus,0)
    };
  }
  function submit(token,{wordLength,answers}){
    const user = userFromToken(token);
    const date = todayStr();
    if(user.submissions.find(s=>s.date===date && s.word_length===wordLength)) throw {apiError:true,status:409,message:"Already submitted for this word length today."};
    const wod = getWordsOfDay(date)[wordLength];
    const catAns = Object.entries(answers).map(([category,answer])=>({category,answer:String(answer||"").trim()}));
    const {rows,grandTotal} = scoreSubmission(catAns, wod.rarity);
    const {dailyPointsTotal,historicPointsTotal,slangPointsTotal} = scoreTotals(rows);
    const doubleBonus = user.unlocked_perks.includes("double_bonus");
    const wordBonus = Math.round(wod.rarity*2*(doubleBonus?2:1));
    const finalTotal = grandTotal+wordBonus;
    user.submissions.push({date,word_length:wordLength,word:wod.word,total_score:finalTotal});
    allSubmissions.push({
      name:user.name, date, word_length:wordLength, word:wod.word,
      daily_points_total:dailyPointsTotal, historic_points_total:historicPointsTotal,
      slang_points_total:slangPointsTotal, total_score:finalTotal
    });
    return {date,wordLength,word:wod.word,wordRarityDaily:wod.rarity,rows,categoryPoints:grandTotal,wordBonus,doubleBonus,finalTotal};
  }
  function confirmCategories(token,{wordLength,categories}){
    const timeLimitSeconds = TIMER(wordLength, categories);
    return {timeLimitSeconds, startedAt: new Date().toISOString()};
  }
  function leaderboard({scope,metric,wordLength,limit}){
    scope = scope==="alltime" ? "alltime" : "today";
    metric = ["daily","historic","overall"].includes(metric) ? metric : "daily";
    const col = metric==="daily" ? "daily_points_total" : metric==="historic" ? "historic_points_total" : "total_score";
    limit = Math.min(limit||20, 100);
    let pool = allSubmissions.slice();
    if(wordLength && wordLength!=="all") pool = pool.filter(s=>s.word_length===Number(wordLength));
    if(scope==="today"){
      const today = todayStr();
      pool = pool.filter(s=>s.date===today);
      pool.sort((a,b)=>b[col]-a[col]);
      const rows = pool.slice(0,limit).map((s,i)=>({rank:i+1,name:s.name,word:s.word,wordLength:s.word_length,points:s[col],date:s.date}));
      return {scope,metric,wordLength:wordLength||"all",date:today,rows};
    }
    const byUser = {};
    pool.forEach(s=>{
      byUser[s.name] = byUser[s.name] || {name:s.name, points:0, submissions:0};
      byUser[s.name].points += s[col];
      byUser[s.name].submissions += 1;
    });
    const rows = Object.values(byUser).sort((a,b)=>b.points-a.points).slice(0,limit).map((r,i)=>({rank:i+1,...r}));
    return {scope,metric,wordLength:wordLength||"all",rows};
  }
  function stats(token){
    const user = userFromToken(token);
    const history = user.submissions.slice().reverse().slice(0,50);
    const nextPerk = PERK_TIERS.filter(p=>!user.unlocked_perks.includes(p.id)).sort((a,b)=>a.days-b.days)[0]||null;
    return {streak:{current_streak:user.current_streak,longest_streak:user.longest_streak,unlocked_perks:user.unlocked_perks}, history, allPerkTiers:PERK_TIERS, nextPerk};
  }

  function linkRequest(token){
    const user = userFromToken(token);
    const code = Array.from({length:6},()=>"ABCDEFGHJKLMNPQRSTUVWXYZ23456789"[Math.floor(Math.random()*33)]).join("");
    return {code, expiresInSeconds:600};
  }

  return {signup,login,status,spin,swapCategory:swapCategoryLocal,submit,stats,PERK_TIERS,confirmCategories,leaderboard,linkRequest};
})();

function parseChallengeFromURL(){
  const params = new URLSearchParams(location.search);
  if(!params.has("beat")) return null;
  const name = params.get("by") || "Someone";
  const score = parseInt(params.get("score"),10);
  const length = parseInt(params.get("len"),10);
  const date = params.get("date");
  const today = new Date().toISOString().slice(0,10);
  if(!score || ![4,5,6,7].includes(length) || date !== today) return null; // stale/malformed — ignore
  return { name, score, length, date };
}

function borderClass(perks){
  perks = perks||[];
  if(perks.includes("legendary_border")) return "perk-legend";
  if(perks.includes("gold_border")) return "perk-gold";
  if(perks.includes("silver_border")) return "perk-silver";
  return "";
}

function initLights(){
  const el = document.getElementById("lights");
  const n = 28; let html="";
  for(let i=0;i<n;i++){
    const angle = (i/n)*2*Math.PI;
    const rx = 49, ry = 49;
    const x = 50 + rx*Math.cos(angle), y = 50 + ry*Math.sin(angle);
    html += `<div class="bulb" style="left:${x}%;top:${y}%;animation-delay:${(i/n)*1.6}s"></div>`;
  }
  el.innerHTML = html;
}

  document.getElementById("cabinet").className = "cabinet " + borderClass(state.streak && state.streak.unlocked_perks);
  document.getElementById("demoBanner").classList.toggle("show", backendReachable===false);
  document.getElementById("apiBaseLabel").textContent = API_BASE;

  const bar = document.getElementById("userbar");
  if(state.user){
    bar.style.display="flex";
    bar.innerHTML = `<span>${state.user.name}</span><button onclick="goLeaderboard()">Leaderboard</button><button onclick="goStats()">Stats</button><button onclick="logout()">Log out</button>`;
  } else { bar.style.display="none"; }

  const app = document.getElementById("app");
  if(state.screen==="auth") app.innerHTML = viewAuth();
  else if(state.screen==="machine") app.innerHTML = viewMachine();
  else if(state.screen==="categories") app.innerHTML = viewCategories();
  else if(state.screen==="answers") app.innerHTML = viewAnswers();
  else if(state.screen==="results") app.innerHTML = viewResults();
  else if(state.screen==="stats") app.innerHTML = viewStats();
  else if(state.screen==="leaderboard") app.innerHTML = viewLeaderboard();
  else if(state.screen==="about") app.innerHTML = viewAbout();
}

/* ---------- AUTH ---------- */
function viewAuth(){
  const isLogin = state.authMode==="login";
  const challengeBanner = state.challenge ? `
    <div class="challenge-banner">
      🎰 <b>${state.challenge.name}</b> scored <b>${state.challenge.score}</b> on today's <b>${state.challenge.length}-letter</b> word.
      <div class="challenge-cta">Think you can beat it?</div>
    </div>` : "";
  return `
    ${challengeBanner}
    <div class="authcard">
      <h2>${isLogin? "Welcome Back" : "Join the House"}</h2>
      <p class="sub">${isLogin? "Sign in to pull today's lever." : "Create an account — real backend accounts with hashed passwords."}</p>
      ${!isLogin? `<label class="field"><span>Full name</span><input type="text" id="nameInput" placeholder="Ada Lovelace"></label>`:""}
      <label class="field"><span>Email address</span><input type="email" id="emailInput" placeholder="ada@example.com"></label>
      <label class="field"><span>Password</span><input type="password" id="passInput" placeholder="At least 8 characters"></label>
      <div id="authError"></div>
      <div class="btn-row"><button class="btn" onclick="submitAuth()">${isLogin?"Sign In":"Create Account"}</button></div>
      <span class="toggle-link" onclick="toggleAuthMode()">${isLogin? "Need an account? Sign up" : "Already have an account? Sign in"}</span>
    </div>
  `;
}
function toggleAuthMode(){ state.authMode = state.authMode==="login"?"signup":"login"; render(); }
async function submitAuth(){
  const email = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passInput").value;
  const errEl = document.getElementById("authError");
  errEl.innerHTML = "";
  try{
    let result;
    if(state.authMode==="signup"){
      const name = document.getElementById("nameInput").value.trim();
      if(!name){ errEl.innerHTML = '<div class="error">Enter your name.</div>'; return; }
      result = await callSignup({name, email, password});
    } else {
      result = await callLogin({email, password});
    }
    authToken = result.token;
    state.user = result.user;
    state.streak = result.streak;
    state.screen = "machine";
    render();
    await loadStatus();
  }catch(e){
    errEl.innerHTML = `<div class="error">${(e && e.message) || "Something went wrong."}</div>`;
  }
}
function logout(){ authToken=null; state = {...state, screen:"auth", user:null, streak:null}; render(); }

/* ---------- MACHINE ---------- */
async function loadStatus(){
  state.dailyStatus = await callStatus();
  state.streak = state.dailyStatus.streak;
  render();
}
function viewMachine(){
  if(!state.dailyStatus) return `<p class="sub">Loading today's machine…</p>`;
  const lengths = [4,5,6,7];
  const reels = lengths.map(len=>{
    const available = state.dailyStatus.availableLengths.includes(len);
    const submitted = state.dailyStatus.submittedLengths.includes(len);
    const revealed = state.reelsRevealed;
    let inner;
    if(!available && !revealed){
      inner = `<div class="padlock">🔒</div><div class="taglabel">7-day streak</div>`;
    } else if(!revealed){
      inner = `<div class="strip">?</div>`;
    } else if(!available){
      inner = `<div class="padlock">🔒</div><div class="taglabel">Streak locked</div>`;
    } else {
      inner = `<div class="strip">${len}</div><div class="taglabel">Letters</div>`;
    }
    const playBtn = (revealed && available) ? `
      <button class="btn reel-playbtn" ${submitted?'disabled':''} onclick="playLength(${len})">
        ${submitted? "Played Today" : "Play"}
      </button>` : "";
    return `
      <div class="reel ${!available?'locked':''} ${state.spinningNow?'spinning':''}">
        ${submitted? '<div class="doneflag">DONE</div>':''}
        ${inner}
      </div>
      ${playBtn}
    `;
  }).join("");

  return `
    <h2>Pull to Reveal Today's Words</h2>
    <p class="sub">One lever, ${lengths.length} reels — 4, 5, 6, and a streak-locked 7-letter reel. Today's arrangement is fixed and identical for every player; the lever just reveals it. One submission per word length, per day.</p>
    <div class="reel-row">${reels}</div>
    ${!state.reelsRevealed ? `<div class="pull-lever-shout">PULL THE LEVER!!!!</div>` : ""}
    <div class="lever-area">
      <div class="lever-track ${!state.reelsRevealed?'glowing':''}">
        <div class="lever-knob ${state.leverPulled?'pulled':''}" onclick="pullLever()"></div>
      </div>
      <div class="lever-label">${state.reelsRevealed? "🎰 REVEALED — CHOOSE A REEL TO PLAY" : "Pull to reveal"}</div>
    </div>
  `;
}
function pullLever(){
  if(state.reelsRevealed) return;
  state.leverPulled = true; state.spinningNow = true;
  render();
  setTimeout(()=>{
    state.spinningNow = false; state.reelsRevealed = true;
    render();
  }, 900);
}
async function playLength(len){
  try{
    const data = await callSpin(len);
    state.activeWordLength = data.wordLength;
    state.activeWord = data.word;
    state.activeWordRarity = data.wordRarityDaily;
    state.categories20 = data.categories;
    state.slangContext = data.slangContext;
    state.selectedCats = [];
    state.screen = "categories";
    render();
  }catch(e){
    alert((e && e.message) || "Couldn't spin that reel.");
  }
}

/* ---------- shared word reveal + how-to-answer explainer ---------- */
function wordBannerHtml(){
  const slangNote = (state.slangContext && state.slangContext.regional && state.slangContext.regional.length)
    ? `<div class="slang-tag">Regional lingo on record for this word: ${state.slangContext.regional.map(r=>r.term+' ('+r.region+')').join(', ')}</div>` : "";
  return `
    <div class="word-banner">
      <div class="tiny">🎰 WORD of the DAY 🎰</div>
      <div class="theword">${state.activeWord}</div>
      <div class="rarity-line">Daily Rarity ${state.activeWordRarity}/100 <span style="opacity:.6">(historic rarity scored per-answer via Google Ngram, 2000–2019)</span></div>
      ${slangNote}
    </div>
    <div class="howto-note">
      <b>How an answer counts:</b> your answer doesn't have to contain or match the word — it just has to <i>connect</i> to it. That connection can be a name, a reference, an object, a place, or any association you can defend. For example, if today's word were <b>OCEAN</b>: under "Movies" you might answer <i>Titanic</i> (set at sea); under "Colors" you might answer <i>Turquoise</i> (an ocean shade); under "Occupations" you might answer <i>Marine Biologist</i>. The looser but sharper the link, the more it stands out.
    </div>
  `;
}

/* ---------- CATEGORIES ---------- */
function viewCategories(){
  const chips = state.categories20.map((cat,i)=>{
    const selected = state.selectedCats.includes(cat.id);
    return `
      <div class="cat-chip ${selected?'selected':''}">
        <span class="num" onclick="toggleCategory('${cat.id}')">No.${String(i+1).padStart(2,'0')}</span>
        <span class="name" onclick="toggleCategory('${cat.id}')">${cat.name}</span>
        <span class="swap" title="Swap for another background category" onclick="swapCat('${cat.id}')">⟳</span>
      </div>`;
  }).join("");
  const n = state.selectedCats.length;
  return `
    ${wordBannerHtml()}
    <h2>Choose Ten Categories — Knowing the Word</h2>
    <p class="sub">The word is already on the table. That's the gamble: every category you lock in now, you're betting you can connect it back to <b>${state.activeWord}</b> before the clock runs out. Pick 10 of these 20, pulled from a background bank of 118. Didn't get a category that fits? Tap ⟳ to swap it for another.</p>
    <div class="cat-status">Selected <b>${n} / 10</b></div>
    <div class="cat-grid">${chips}</div>
    <div class="btn-row">
      <button class="btn ghost" onclick="backToMachine()">Back</button>
      <button class="btn" ${n===10?'':'disabled'} onclick="goToAnswers()">Confirm 10 Categories</button>
    </div>
  `;
}
function toggleCategory(id){
  const idx = state.selectedCats.indexOf(id);
  if(idx>-1) state.selectedCats.splice(idx,1);
  else { if(state.selectedCats.length>=10) return; state.selectedCats.push(id); }
  render();
}
async function swapCat(id){
  try{
    const res = await callSwap({wordLength: state.activeWordLength, currentCategories: state.categories20, categoryIdToReplace: id});
    state.categories20 = res.categories;
    if(!state.categories20.find(c=>c.id===id)){
      state.selectedCats = state.selectedCats.filter(cid=>cid!==id);
    }
    render();
  }catch(e){ alert((e&&e.message)||"Couldn't swap that category."); }
}
function backToMachine(){
  clearTimerInterval();
  state.reelsRevealed=false; state.leverPulled=false; state.screen="machine"; render(); loadStatus();
}
async function goToAnswers(){
  if(state.selectedCats.length!==10) return;
  state.answers = {};
  state.selectedCats.forEach(id=>{ state.answers[id]=""; });
  const chosen = state.selectedCats.map(id => state.categories20.find(c=>c.id===id));
  try{
    const timer = await callConfirmCategories({wordLength: state.activeWordLength, categories: chosen});
    state.timeLimitSeconds = timer.timeLimitSeconds;
    state.timeRemaining = timer.timeLimitSeconds;
  }catch(e){
    state.timeLimitSeconds = 120; state.timeRemaining = 120; // safe default if the call fails
  }
  state.screen = "answers";
  render();
  startTimerInterval();
}
function clearTimerInterval(){
  if(state.timerInterval){ clearInterval(state.timerInterval); state.timerInterval=null; }
}
function startTimerInterval(){
  clearTimerInterval();
  state.timerInterval = setInterval(()=>{
    state.timeRemaining -= 1;
    if(state.timeRemaining <= 0){
      state.timeRemaining = 0;
      clearTimerInterval();
      submitAnswers(true); // time's up — auto-submit whatever is filled in
      return;
    }
    updateTimerDisplay();
  }, 1000);
}
function updateTimerDisplay(){
  const el = document.getElementById("timerDisplay");
  if(!el) return;
  const m = Math.floor(state.timeRemaining/60), s = state.timeRemaining%60;
  el.textContent = `${m}:${String(s).padStart(2,'0')}`;
  el.classList.toggle("urgent", state.timeRemaining <= 15);
}

/* ---------- ANSWERS ---------- */
function viewAnswers(){
  const rows = state.selectedCats.map((id,i)=>{
    const cat = state.categories20.find(c=>c.id===id);
    return `
      <div class="answer-row">
        <div class="cat-label">No.${String(i+1).padStart(2,'0')} — ${cat.name}</div>
        <input type="text" id="ans-${id}" placeholder="Your ${cat.name} answer, connected to ${state.activeWord}…"
          value="${(state.answers[id]||"").replace(/"/g,'&quot;')}"
          oninput="state.answers['${id}']=this.value">
      </div>`;
  }).join("");
  const m = Math.floor(state.timeRemaining/60), s = state.timeRemaining%60;
  return `
    <div class="word-banner word-banner-compact">
      <div class="tiny">WORD of the DAY</div>
      <div class="theword">${state.activeWord}</div>
    </div>
    <div class="timer-bar">
      <span class="timer-label">Time Left</span>
      <span class="timer-display" id="timerDisplay">${m}:${String(s).padStart(2,'0')}</span>
    </div>
    <h2>Fill the Ledger</h2>
    <p class="sub">Give an answer connected to <b>${state.activeWord}</b> for each category — a name, reference, object, or association all count. No right or wrong, you're scored on rarity. Unanswered categories score zero when the clock runs out.</p>
    ${rows}
    <div class="btn-row">
      <button class="btn ghost" onclick="clearTimerInterval();state.screen='categories';render();">Back</button>
      <button class="btn" onclick="submitAnswers(false)">Seal the Ledger</button>
    </div>
  `;
}
async function submitAnswers(auto){
  const empties = state.selectedCats.filter(id=>!state.answers[id] || !state.answers[id].trim());
  if(!auto && empties.length){
    if(!confirm(`${empties.length} answer(s) left blank — they'll score zero. Submit anyway?`)) return;
  }
  clearTimerInterval();
  const answersByName = {};
  state.selectedCats.forEach(id=>{
    const cat = state.categories20.find(c=>c.id===id);
    answersByName[cat.name] = state.answers[id] || "";
  });
  try{
    const res = await callSubmit({wordLength: state.activeWordLength, answers: answersByName});
    state.results = res;
    state.screen = "results";
    render();
    await loadStatus();
  }catch(e){
    alert((e && e.message) || "Couldn't submit — try again.");
  }
}

/* ---------- RESULTS ---------- */
const TIER_HEX = { Skipped:"#5a6270", Common:"#5a6270", Uncommon:"#a2512c", Rare:"#b1852c", Legendary:"#7a2230" };

function challengeOutcomeHtml(r){
  if(!state.challenge || state.challenge.length !== state.activeWordLength) return "";
  const diff = r.finalTotal - state.challenge.score;
  let line;
  if(diff > 0) line = `🏆 You beat ${state.challenge.name}'s ${state.challenge.score} by ${diff} points.`;
  else if(diff < 0) line = `${state.challenge.name} still leads by ${-diff} points — try another category pick tomorrow.`;
  else line = `Dead even with ${state.challenge.name} at ${r.finalTotal}. A tiebreaker's overdue.`;
  return `<div class="challenge-outcome">${line}</div>`;
}

function buildChallengeLink(r){
  const base = location.origin + location.pathname;
  const params = new URLSearchParams({ beat:"1", by: state.user.name, score: String(r.finalTotal), len: String(state.activeWordLength), date: r.date });
  return `${base}?${params.toString()}`;
}
function buildShareText(r){
  return `🎰 I scored ${r.finalTotal} on today's ${state.activeWordLength}-letter CASINOGORY word. Beat my score → ${buildChallengeLink(r)}`;
}
async function copyShareText(){
  const text = buildShareText(state.results);
  try{
    await navigator.clipboard.writeText(text);
    const el = document.getElementById("shareCopyStatus");
    if(el){ el.textContent = "Copied!"; setTimeout(()=>{ if(el) el.textContent=""; }, 2000); }
  }catch(e){
    prompt("Copy this:", text);
  }
}
function downloadScoreCard(){
  const r = state.results;
  const W=640,H=800;
  const canvas = document.createElement("canvas");
  canvas.width=W; canvas.height=H;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle="#12151c"; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#d9b64a"; ctx.lineWidth=8; ctx.strokeRect(16,16,W-32,H-32);
  ctx.textAlign="center";
  ctx.fillStyle="#d9b64a"; ctx.font="bold 44px 'Arial'"; ctx.fillText("CASINOGORY", W/2, 100);
  ctx.fillStyle="#e3c9ce"; ctx.font="16px 'Arial'"; ctx.fillText("BEAT MY SCORE", W/2, 135);
  ctx.fillStyle="#f3ead4"; ctx.font="italic bold 56px Georgia"; ctx.fillText(r.word, W/2, 220);
  ctx.fillStyle="#c9a6ad"; ctx.font="14px 'Arial'"; ctx.fillText(`${state.activeWordLength}-LETTER WORD OF THE DAY`, W/2, 250);
  // tier squares, two rows of five
  const sq=52, gap=14, rowW = sq*5 + gap*4, startX = W/2 - rowW/2, startY=300;
  r.rows.forEach((row,i)=>{
    const col=i%5, rowIdx=Math.floor(i/5);
    const x = startX + col*(sq+gap), y = startY + rowIdx*(sq+gap);
    ctx.fillStyle = TIER_HEX[row.tier] || "#5a6270";
    ctx.fillRect(x,y,sq,sq);
  });
  ctx.fillStyle="#d9b64a"; ctx.font="bold 90px 'Arial'"; ctx.fillText(String(r.finalTotal), W/2, 520);
  ctx.fillStyle="#e3c9ce"; ctx.font="16px 'Arial'"; ctx.fillText("POINTS", W/2, 550);
  ctx.fillStyle="#f3ead4"; ctx.font="bold 24px 'Arial'"; ctx.fillText(`Think you can beat ${state.user.name}?`, W/2, 630);
  ctx.fillStyle="#c9a6ad"; ctx.font="14px 'Arial'"; ctx.fillText(location.hostname || "play now", W/2, 660);

  canvas.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download="casinogory-score-card.png"; a.click();
    URL.revokeObjectURL(url);
  });
}

function viewResults(){

    <div class="ledger-row">

      </div>

    </div>
  `).join("");
  return `
    <h2>Today's Ledger — Sealed</h2>

    ${rowsHtml}

    <div class="bonus-line">Category points ${r.categoryPoints} + Word-of-day bonus ${r.wordBonus}${r.doubleBonus?" (doubled — Legendary perk active)":""}</div>
    ${challengeOutcomeHtml(r)}
    <div class="share-panel">
      <h2 style="margin-top:0;">Beat My Score</h2>
      <p class="sub">Challenge someone — they'll see your score before they play, and get a head-to-head result when they finish.</p>
      <div class="btn-row" style="justify-content:flex-start;">
        <button class="btn" onclick="copyShareText()">Copy Challenge Link</button>
        <button class="btn ghost" onclick="downloadScoreCard()">Download Score Card</button>
        <span id="shareCopyStatus" class="share-copy-status"></span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn ghost" onclick="backToMachine()">Back to Machine</button>
      <button class="btn" onclick="goStats()">View Stats</button>
    </div>
    <div class="note"><b>On scoring:</b> Daily points come from a same-day rarity heuristic; Historic points come from ${backendReachable? "a live Google Ngram lookup (2000–2019 average frequency)" : "a simulated stand-in for that same lookup — connect the real backend for live corpus data"}; the Slang Bonus rewards answers that match a curated regional-lingo term.</div>
  `;

/* ---------- ABOUT ---------- */
function goAbout(){
  if(state.screen !== "about") state.previousScreen = state.screen;
  state.screen = "about";
  render();
}
function backFromAbout(){
  state.screen = state.previousScreen || "auth";

}
